<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>13x28 Master Clock</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --grid-line: #cccccc;
            --accent: #000000;
        }
        body {
            font-family: monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .calendar-container {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            max-width: 1200px;
            margin: 0 auto;
        }
        .month-block {
            border: 1px solid var(--grid-line);
            padding: 15px;
            background: #ffffff;
        }
        .month-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--grid-line);
            padding-bottom: 5px;
        }
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .day-header {
            font-size: 0.8em;
            color: #555555;
        }
        .day-cell {
            padding: 10px 0;
            border: 1px solid #eeeeee;
        }
    </style>
</head>
<body>

    <h1>13x28 Master Temporal Grid</h1>
    <div id="calendar" class="calendar-container"></div>

    <script>
        // Core Logic: 13 completely isolated months, 28 days each.
        const daysOfWeek = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        const totalMonths = 13;
        const daysPerMonth = 28;
        const calendarDiv = document.getElementById('calendar');

        for (let month = 1; month <= totalMonths; month++) {
            // Isolating each individual month block to keep them strictly separated
            const monthDiv = document.createElement('div');
            monthDiv.className = 'month-block';

            const title = document.createElement('div');
            title.className = 'month-title';
            title.innerText = `MONTH ${month}`;
            monthDiv.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'week-grid';

            // Keeping your exact day headers unchanged
            daysOfWeek.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerText = day;
                grid.appendChild(header);
            });

            // Correcting and locking the loop to run exactly 28 days for every month
            for (let day = 1; day <= daysPerMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                dayCell.innerText = day;
                grid.appendChild(dayCell);
            }

            monthDiv.appendChild(grid);
            calendarDiv.appendChild(monthDiv);
        }

        // Service Worker Registration for PWA containment
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('[SYSTEM ALIGNMENT] Service Worker Active. Zero-Drift Matrix locked.'))
            .catch(err => console.error('[SYSTEM FAULT] Leak detected:', err));
        }
    </script>
</body>
</html>
